<!DOCTYPE html>
<html>
<head>
    <title>Items</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='mystyle.css') }}">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">Rentify</div>

    <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/items">Items</a></li>
        <li><a href="/register">Register</a></li>
        <li><a href="/login">Login</a></li>
        <li><a href="/contact">Contact</a></li>
    </ul>
</nav>

<!-- TITLE -->
<h1 class="title">Available Items</h1>

<!-- ITEMS -->
<div class="items-container">

    {% for item in items %}
    <div class="item-card">

        <!-- IMAGE -->
        <img src="{{ url_for('static', filename='uploads/' + item[5]) if item[5] else url_for('static', filename='uploads/default.png') }}" class="item-img">

        <!-- DETAILS -->
        <h3>{{ item[1] }}</h3>
        <p>₹{{ item[2] }} / day</p>
        <p>📞 {{ item[3] }}</p>
        <p>📧 {{ item[4] }}</p>

    </div>
    {% endfor %}

</div>

<!-- FOOTER -->
<footer>
<p>© 2026 Rentify. All Rights Reserved.</p>
</footer>

</body>
</html>
