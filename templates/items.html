<!DOCTYPE html>
<html>
<head>
    <title>Items</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='mystyle.css') }}">
</head>

<body>


    <nav class ="navbar">
<div class ="logo">Rentify</div>

<ul class ="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/items">Items</a></li>
    <li><a href="/register">Register</a></li>
    <li> <a href="/login">Login</a></li>
    <li> <a href="/contact">Contact</a> </li>

</ul>

</nav>

    <h1 class="title">Available Items</h1>

    <div class="items-container">

        {% for item in items %}
        <div class="item-card">
            <h3>{{ item[1] }}</h3>
            <p>₹{{ item[2] }} / day</p>
            <p>📞 {{ item[3] }}</p>
            <p>📧 {{ item[4] }}</p>
        </div>
        {% endfor %}

    </div>

    
<footer>
<p>© 2026 Rentify. All Rights Reserved.</p>
 </footer>

</body>
</html>
