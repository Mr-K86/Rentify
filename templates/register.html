<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/footer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
</head>

<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="logo">Rentify</div>
    <div class="nav-container">
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/items">Items</a></li>
        <li><a href="/login">Login</a></li>
           
        </ul>
    </div>
</nav>

<!-- Register Form -->
<div class="form-container">
    <h2>Register</h2>

<form method="POST">
    <input type="text" name="Full_Name" placeholder="Full Name" required><br><br>

    <input type="text" name="Mobile" placeholder="Mobile Number" required><br><br>

    <input type="email" name="Email" placeholder="Email" required><br><br>

    <input type="text" name="Adhar_No" placeholder="Aadhaar Number" required><br><br>

    <input type="text" name="Pan_No" placeholder="PAN Number" required><br><br>

    <input type="password" name="Password" placeholder="Password" required><br><br>

    
    <button type="submit">Register</button>
</form>
</div>

<!-- Footer -->
<footer>
    <p>© 2026 Rentify. All Rights Reserved.</p>
</footer>

</body>
</html>
