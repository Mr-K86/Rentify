<!DOCTYPE html>
<html>
<head>
    <title>Rental Agreement</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='mystyle.css') }}">
</head>

<body>

<div class="rent-box">

    <h2>Rental Agreement</h2>

    <p class="agreement-text">
        I agree to rent this item under terms and conditions.
        The renter is responsible for any damage and must return the item on time.
    </p>

    <form method="POST">

        <!-- ✅ FIX 1: item_id hidden field — Flask route ko confirm karta hai -->
        <input type="hidden" name="item_id" value="{{ item_id }}">

        <!-- Full Name -->
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Enter your name" required>

        <!-- Aadhaar -->
        <label>Aadhaar Number</label>
        <input type="text" name="adhar" placeholder="12-digit Aadhaar"
            pattern="[0-9]{12}" title="Enter 12 digit Aadhaar"
            maxlength="12" required>

        <!-- Mobile -->
        <label>Mobile Number</label>
        <input type="text" name="mobile" placeholder="10-digit mobile"
            pattern="[0-9]{10}" title="Enter 10 digit mobile number"
            maxlength="10" required>

        <!-- Terms -->
        <div class="checkbox">
            <input type="checkbox" id="terms" required>
            <span>I Agree to Terms & Conditions</span>
        </div>

        <!-- Submit -->
        <button type="submit" class="rent-submit-btn">
            Proceed to Payment
        </button>

    </form>

</div>

</body>
</html>
