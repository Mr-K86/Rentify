<!DOCTYPE html>
<html>
<head>
    <title>My Items</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/my_items.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/footer.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">

</head>

<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="logo">Rentify</div>

    <div class="nav-container">
        <ul class="nav-links">
        <li><a href="/items">Available Items</a></li>
        <li><a href="/add_item">Add Item</a></li>
        <li><a href="/my_rentals">My Rentals</a></li>
        <li><a href="/logout">Logout</a></li>

    </ul>
</nav>

    

<h1 class="title">📦 My Items</h1>

<div class="items-container">

    {% for item in items %}
    <div class="item-card">
        <img src="{{ url_for('static', filename='uploads/' + item[5]) if item[5] else url_for('static', filename='uploads/default.png') }}" class="item-img">
        <h3>{{ item[1] }}</h3>
        <p>₹{{ item[2] }} / day</p>
        <p>📞 {{ item[3] }}</p>
        <p>📧 {{ item[4] }}</p>
    </div>
    {% endfor %}

</div>

<!-- Footer -->
<footer>
    <p>© 2026 Rentify. All Rights Reserved.</p>
</footer>

</body>
</html>
