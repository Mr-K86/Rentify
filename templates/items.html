<!DOCTYPE html>
<html>
<head>
    <title>Items</title>

    <!-- CSS file connect -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/footer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/items.css') }}">

</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar">
    <div class="logo">Rentify</div>
    <div class="nav-container">
    <ul class="nav-links">
        <!-- Navigation links -->
        <li><a href="/">Home</a></li>
        <li><a href="/register">Register</a></li>
        <li><a href="/login">Login</a></li>
        <li><a href="/contact">Contact</a></li>
    </ul>
</nav>

<!-- ================= PAGE TITLE ================= -->
<h1 class="title">Available Items</h1>

<!-- ================= ITEMS CONTAINER ================= -->
<div class="items-container">

    <!-- Loop: database se items aa rahe hain -->
    {% for item in items %}
    <div class="item-card">

        <!-- Item Image -->
        <!-- Agar image hai to show karega, warna default image -->
        <img src="{{ url_for('static', filename='uploads/' + item[5]) if item[5] else url_for('static', filename='uploads/default.png') }}" class="item-img">

        <!-- Item Name -->
        <h3>{{ item[1] }}</h3>

        <!-- Item Price -->
        <p>₹{{ item[2] }} / day</p>

        <!-- Contact Number -->
        <p>📞 {{ item[3] }}</p>

        <!-- Email -->
        <p>📧 {{ item[4] }}</p>

        <!-- ================= RENT NOW BUTTON ================= -->
        <!-- Ye button email ke niche show hoga -->
        <!-- item[0] = item id (database se) -->

        
        {% if item[6] %}
    <!-- Already rented -->
    <button class="rent-btn disabled">Already Rented</button>
{% else %}
    <!-- Available -->
    <a href="/rent/{{ item[0] }}" class="rent-btn">Rent Now</a>


{% endif %}
    </div>
    {% endfor %}

</div>

<!-- ================= FOOTER ================= -->
<footer>
    <p>© 2026 Rentify. All Rights Reserved.</p>
</footer>

</body>
</html>
