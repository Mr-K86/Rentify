<!DOCTYPE html>
<html>
<head>
    <title>My Items</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='mystyle.css') }}">
</head>

<body>

    

<h1 class="title">📦 My Items</h1>

<div class="items-container">

    {% for item in items %}
    <div class="item-card">
        <img src="{{ url_for('static', filename='uploads/' + item[5]) if item[5] else url_for('static', filename='uploads/default.png') }}" class="item-img">
        <h3>{{ item[1] }}</h3>
        <p>₹{{ item[2] }} / day</p>
        <p>📞 {{ item[3] }}</p>
        <p>📧 {{ item[4] }}</p>
    </div>
    {% endfor %}

</div>

</body>
</html>
